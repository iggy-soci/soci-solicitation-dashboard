name: refresh dashboard

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min; adjust as needed
  workflow_dispatch:           # manual run button

permissions:
  contents: write              # allow committing dashboard_data.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch Pendo + build dashboard data
        env:
          PENDO_INTEGRATION_KEY: ${{ secrets.PENDO_INTEGRATION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PENDO_SUB_ID: "6230324726202368"
        run: python build_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json
          git commit -m "refresh dashboard data $(date -u +%FT%TZ)" || echo "no changes"
          git push
